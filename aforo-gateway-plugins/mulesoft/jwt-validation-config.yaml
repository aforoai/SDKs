#     doc:name="Validate Aforo JWT">
#     <jwt:jwt-crypto-config>
#       <jwt:rsa-key-config jwksUrl="${AFORO_JWKS_URI}"
#                           jwksCacheAge="${config.jwks-cache-ttl-seconds}"/>
#     </jwt:jwt-crypto-config>
#     <jwt:validations>
#       <jwt:is-not-expired/>
#       <jwt:validate-claim claimName="iss" expectedValue="${AFORO_JWT_ISSUER}"
#         failIfNotPresent="false"/>
#     </jwt:validations>
#   </jwt:validate-jwt>
#
#   <!-- Step 3: Extract claims into flow variables -->
#   <set-variable variableName="aforo.tenantId"
#     value='#[vars.claimsVar["tenant_id"] default ""]'/>
#   <set-variable variableName="aforo.customerId"
