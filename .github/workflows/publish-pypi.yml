name: Publish — PyPI

# Publishes one Python package to PyPI via Trusted Publishing (OIDC) — no API
# token stored anywhere. Manual trigger for the same safety reason as npm.
#
# One-time setup required before this can run:
#   - The PyPI project name (e.g. aforo-metering) is registered/owned by you.
#   - On PyPI: add a Trusted Publisher for this repo + this workflow file +
#     the `pypi` environment (Project → Publishing → Add a new publisher).
#     https://docs.pypi.org/trusted-publishers/
#
# Usage: Actions → "Publish — PyPI" → Run workflow → enter the package directory,
#        e.g. aforo-metering-sdks/python

on:
  workflow_dispatch:
    inputs:
      package_dir:
        description: "Python package directory (e.g. aforo-metering-sdks/python)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi   # the Trusted Publisher is bound to this environment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build sdist + wheel
        working-directory: ${{ inputs.package_dir }}
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ inputs.package_dir }}/dist
